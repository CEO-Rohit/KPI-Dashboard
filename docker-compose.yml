version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fnb_kpi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fnb_dashboard
      POSTGRES_USER: fnb_admin
      POSTGRES_PASSWORD: fnb_secure_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
